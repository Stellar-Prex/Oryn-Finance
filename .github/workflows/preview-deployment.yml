name: Preview deployment

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build

      - id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          deployment=$(npx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN" --yes --json 2>&1)
          url=$(echo "$deployment" | jq -r '.url // .deployment' 2>/dev/null || echo "")
          if [ -z "$url" ]; then
            url=$(echo "$deployment" | grep -oP 'https://[^\s]+' | head -n 1 || echo "")
          fi
          id=$(echo "$deployment" | jq -r '.id // .deploymentId // ""' 2>/dev/null || echo "")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "deployment=$deployment" >> "$GITHUB_OUTPUT"

      - if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-deployment-url -->';
            const url = '${{ steps.deploy.outputs.url }}';
            const deploymentId = '${{ steps.deploy.outputs.id }}';
            
            const body = `${marker}
            
            ## Preview Deployment Ready
            
            **URL:** [${url}](${url})
            
            ${deploymentId ? `**Deployment ID:** \`${deploymentId}\`` : ''}
            
            This preview will be automatically removed when the pull request is merged.`;
            
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            
            const existing = comments.find((comment) => 
              comment.body && 
              comment.body.includes(marker) && 
              comment.user?.type === 'Bot'
            );
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        id: preview
        with:
          script: |
            const marker = '<!-- preview-deployment-url -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            
            const existing = comments.find((comment) => 
              comment.body && 
              comment.body.includes(marker) && 
              comment.user?.type === 'Bot'
            );
            
            if (!existing) {
              core.setOutput('comment_id', '');
              core.setOutput('deployment_id', '');
              return;
            }
            
            const deploymentIdMatch = existing.body.match(/Deployment ID: `([^`]+)`/);
            core.setOutput('comment_id', String(existing.id));
            core.setOutput('deployment_id', deploymentIdMatch ? deploymentIdMatch[1] : '');

      - if: steps.preview.outputs.deployment_id != ''
        run: |
          curl -fs -X DELETE \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v13/deployments/${{ steps.preview.outputs.deployment_id }}" || true

      - if: steps.preview.outputs.comment_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: Number('${{ steps.preview.outputs.comment_id }}'),
              body: '<!-- preview-deployment-url -->\n\nPreview deployment removed after merge.',
            });
